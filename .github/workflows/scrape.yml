name: IPO data pipeline

on:
  schedule:
    # Times are UTC. IST = UTC + 5:30. Indian market hours ≈ 9:15–15:30 IST,
    # which is 03:45–10:00 UTC. We keep a light schedule outside those hours
    # and a heavier one during the session.

    # "hot": GMP + subscription — every 30 min during IST market hours.
    - cron: "*/30 3-10 * * 1-5"

    # "core": dashboard + NSE + BSE — top of every hour.
    - cron: "0 * * * *"

    # "cold": DRHP/RHP + allotment + shareholder — every 6h.
    - cron: "15 */6 * * *"

    # "detail": per-IPO deep scrape — once a day at 02:30 UTC (08:00 IST).
    - cron: "30 2 * * *"

  # Manual trigger from the Actions tab. Pick which group to run.
  workflow_dispatch:
    inputs:
      target:
        description: "Group or source name (e.g. hot, core, cold, detail, backfill, all)"
        required: true
        default: "hot"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      # Don't let two scheduled runs overlap for the same target — if
      # one runs long, the next waits rather than doubling up requests.
      group: scrape-${{ github.event.schedule || inputs.target }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pick target
        id: target
        run: |
          case "${{ github.event.schedule }}" in
            "*/30 3-10 * * 1-5") echo "group=hot"    >> "$GITHUB_OUTPUT" ;;
            "0 * * * *")          echo "group=core"   >> "$GITHUB_OUTPUT" ;;
            "15 */6 * * *")       echo "group=cold"   >> "$GITHUB_OUTPUT" ;;
            "30 2 * * *")         echo "group=detail" >> "$GITHUB_OUTPUT" ;;
            *)                    echo "group=${{ inputs.target }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run pipeline
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -m pipeline run "${{ steps.target.outputs.group }}"
